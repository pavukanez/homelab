apiVersion: v1
kind: Namespace
metadata:
  name: beszel
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: beszel-hub
  namespace: beszel
spec:
  replicas: 1
  selector:
    matchLabels:
      app: beszel-hub
  template:
    metadata:
      labels:
        app: beszel-hub
    spec:
      containers:
      - name: beszel-hub
        image: henrygd/beszel:latest
        ports:
        - containerPort: 8090
        volumeMounts:
        - name: data
          mountPath: /beszel_data
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: beszel-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: beszel-data
  namespace: beszel
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: beszel-hub
  namespace: beszel
spec:
  selector:
    app: beszel-hub
  ports:
  - port: 8090
    targetPort: 8090
    protocol: TCP
  type: ClusterIP
