apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: beszel-agent
  namespace: beszel
  labels:
    app: beszel-agent
spec:
  selector:
    matchLabels:
      app: beszel-agent
  template:
    metadata:
      labels:
        app: beszel-agent
    spec:
      hostNetwork: true
      containers:
        - name: agent
          image: henrygd/beszel-agent:latest
          env:
            - name: PORT
              value: "45876"
            - name: KEY
              value: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIFvyY4SMBfGB3AkfKDAhvOtG+g8WsJ/uPn81My+3S7qX"
            - name: HUB_URL
              value: "http://192.168.1.89:30090"
          ports:
            - containerPort: 45876
              hostPort: 45876
          volumeMounts:
            - name: host-root
              mountPath: /extra-filesystems/root
              readOnly: true
      volumes:
        - name: host-root
          hostPath:
            path: /
      tolerations:
        - effect: NoSchedule
          key: node-role.kubernetes.io/master
          operator: Exists
        - effect: NoSchedule
          key: node-role.kubernetes.io/control-plane
          operator: Exists
  updateStrategy:
    type: RollingUpdate
