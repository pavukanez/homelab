apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: netdata
  namespace: flux-system
spec:
  interval: 5m
  targetNamespace: netdata
  chart:
    spec:
      chart: netdata
      version: ">=3.7.134"
      sourceRef:
        kind: HelmRepository
        name: netdata
  values:
    parent:
      enabled: true
      service:
        type: NodePort
        nodePort: 30091   # accessible via http://<node-ip>:30091
        ports:
          http: 19999
      resources:
        requests:
          memory: "256Mi"
          cpu: "100m"
        limits:
          memory: "512Mi"
          cpu: "200m"
    
    child:
      resources:
        requests:
          memory: "64Mi"
          cpu: "50m"
        limits:
          memory: "128Mi"
          cpu: "100m"

    # Disable Ingress entirely
    ingress:
      enabled: false

    netdata:
      configs:
        "netdata.conf": |
          [global]
            enable statistics = no
      kube-state-metrics:
        enabled: true
      kubernetes:
        enabled: true
      docker:
        enabled: true
      coredns:
        enabled: true
