apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: HelmRepository
metadata:
  name: netdata
  namespace: flux-system
spec:
  interval: 1h
  url: https://netdata.github.io/helmchart/
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: netdata
  namespace: flux-system
spec:
  interval: 1h
  chart:
    spec:
      chart: netdata
      version: "4.x.x"
      sourceRef:
        kind: HelmRepository
        name: netdata
        namespace: flux-system
  values:
    parent:
      database:
        storage: 2048