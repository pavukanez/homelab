apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: beszel
  namespace: flux-system
spec:
  interval: 15m
  timeout: 5m
  chart:
    spec:
      chart: beszel
      sourceRef:
        kind: HelmRepository
        name: beszel
        namespace: flux-system
      interval: 1h
  values:
    replicaCount: 1
    service:
      type: ClusterIP
      port: 8080
